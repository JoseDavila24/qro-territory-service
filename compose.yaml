services:

  mysql:
    image: mysql:8.0
    container_name: qro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qro_territory}
      MYSQL_USER: ${MYSQL_USER:-qro_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-qro_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.dev
    container_name: qro-app-dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_USERNAME: ${MYSQL_USER:-qro_user}
      QUARKUS_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-qro_pass}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-qro_territory}
      APP_API_KEY: ${APP_API_KEY:-changeme}
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - .:/workspace
      - maven_cache:/root/.m2
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  maven_cache:
