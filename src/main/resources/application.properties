quarkus.datasource.db-kind=mysql
quarkus.datasource.username=qro_user
quarkus.datasource.password=qro_pass
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/qro_territory

quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# %prod: crear/actualizar esquema sin borrar datos; no cargar seed data
%prod.quarkus.hibernate-orm.schema-management.strategy=update
%prod.quarkus.hibernate-orm.sql-load-script=no-file

# Railway inyecta PORT automáticamente; se lee directo para evitar que QUARKUS_HTTP_PORT llegue vacío
%prod.quarkus.http.port=${PORT:8080}

# Observabilidad: Health checks y métricas en Quarkus
quarkus.smallrye-health.enabled=true
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# Parámetros básicos del servidor
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Establecer el tiempo de espera de inactividad a 30 segundos
quarkus.http.idle-timeout=30S

# Clave de API para endpoints administrativos (sobreescribir en producción vía env var APP_API_KEY)
app.api-key=${APP_API_KEY}
